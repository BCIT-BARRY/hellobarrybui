<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Barry Bui{% endblock title %}</title>
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='images/favicon.svg') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  {% block extra_css %}{% endblock extra_css %}
</head>
<body>
  <div class="page-shell">

    <header class="site-header">
      <div class="container">
        <nav class="site-nav">
          <a class="site-nav__brand" href="{{ url_for('main.index') }}">
<div class="site-nav__logo">
  <img src="{{ url_for('static', filename='images/favicon.svg') }}" alt="BB logo">
</div>
            <span class="site-nav__name">Barry Bui</span>
          </a>
          <div class="site-nav__links">
            <a href="{{ url_for('main.projects') }}">Projects</a>
            <a href="{{ url_for('main.about') }}">About</a>
          </div>
        </nav>
      </div>
    </header>

    <main class="container">
      {% block content %}{% endblock content %}
    </main>

    <footer class="site-footer">
      <div class="container">
        <div class="site-footer__wrap">
          <div class="site-footer__links">
            <a href="mailto:bbui11@my.bcit.ca">Email</a>
            <span class="site-footer__sep" aria-hidden="true">|</span>
            <a href="https://www.linkedin.com/in/barrybui/" rel="noreferrer noopener" target="_blank">LinkedIn</a>
          </div>
          <p class="site-footer__copy">© Barry Bui 2026</p>
        </div>
      </div>
    </footer>

  </div>

  {% block extra_js %}{% endblock extra_js %}
</body>
</html>
